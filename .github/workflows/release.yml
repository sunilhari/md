name: Release

# Triggers on any tag starting with v (e.g. v1.0.0, v0.2.1)
# Also dispatchable manually from the Actions tab for testing
on:
  push:
    tags: ['v[0-9]*']
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # ── macOS — universal binary (Apple Silicon + Intel) ─────────────────────
  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set these secrets in repo settings to code-sign the app.
          # Without them the app builds fine but macOS will show a security
          # warning on first launch (right-click → Open to bypass Gatekeeper).
          #
          # APPLE_CERTIFICATE:            ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY:       ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID:                     ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD:               ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID:                ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MDX Browser ${{ github.ref_name }}
          releaseBody: |
            ## MDX Browser ${{ github.ref_name }}

            A Tauri desktop app that renders `.md` and `.mdx` files with a
            rich component library — diagrams, tabs, callouts, diffs, and more.

            ### Install

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon + Intel) | `.dmg` |

            > **First launch on macOS:** the app is unsigned. Right-click the
            > `.app` → **Open** to bypass Gatekeeper, or run:
            > ```
            > xattr -cr /Applications/MDX\ Browser.app
            > ```

            ### Keyboard shortcuts

            | Action | Shortcut |
            |--------|----------|
            | Open file | `⌘O` |
            | Settings | `⌘,` |
            | Close settings | `Esc` |
          releaseDraft: ${{ inputs.draft || true }}
          prerelease: false
          args: --target universal-apple-darwin

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux WebKit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MDX Browser ${{ github.ref_name }}
          releaseBody: Linux build
          releaseDraft: ${{ inputs.draft || true }}
          prerelease: false

  # ── Windows ───────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MDX Browser ${{ github.ref_name }}
          releaseBody: Windows build
          releaseDraft: ${{ inputs.draft || true }}
          prerelease: false
